openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Benefits Enrollment Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employers
    description: Employer/company management
  - name: users
    description: Admin user management
  - name: employees
    description: Employee management
  - name: dependents
    description: Employee dependent management
  - name: benefits
    description: Benefits plan management
  - name: enrollments
    description: Enrollment management
  - name: enrollment-periods
    description: Enrollment window management
  - name: enrollment-changes
    description: Change approval workflow
  - name: carriers
    description: Insurance carrier management
  - name: documents
    description: Document and form management
  - name: integrations
    description: Payroll and external integrations
  - name: dashboard
    description: Dashboard summary data
  - name: invitations
    description: Employee invitation management
  - name: notifications
    description: System notifications and alerts
  - name: chatbot
    description: Benefits Q&A chatbot

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/enrollment-activity:
    get:
      operationId: getEnrollmentActivity
      tags: [dashboard]
      summary: Get recent enrollment activity
      responses:
        "200":
          description: List of recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/enrollment-by-plan:
    get:
      operationId: getEnrollmentByPlan
      tags: [dashboard]
      summary: Get enrollment counts grouped by plan
      responses:
        "200":
          description: Enrollment breakdown by plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanEnrollmentCount"

  # Employees
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      parameters:
        - name: employerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create a new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/import-csv:
    post:
      operationId: importEmployeesCsv
      tags: [employees]
      summary: Import employees from CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsvImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Invitations
  /employees/{id}/invite:
    post:
      operationId: sendEmployeeInvitation
      tags: [invitations]
      summary: Send enrollment invitation email to employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResult"

  /invitations/bulk:
    post:
      operationId: sendBulkInvitations
      tags: [invitations]
      summary: Send bulk invitations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkInvitationInput"
      responses:
        "200":
          description: Bulk invitation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkInvitationResult"

  # Benefits Plans
  /benefits:
    get:
      operationId: listBenefitPlans
      tags: [benefits]
      summary: List all benefit plans
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: carrierId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of benefit plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BenefitPlan"
    post:
      operationId: createBenefitPlan
      tags: [benefits]
      summary: Create a benefit plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenefitPlanInput"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitPlan"

  /benefits/{id}:
    get:
      operationId: getBenefitPlan
      tags: [benefits]
      summary: Get benefit plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Benefit plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitPlan"
    patch:
      operationId: updateBenefitPlan
      tags: [benefits]
      summary: Update benefit plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenefitPlanUpdate"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitPlan"
    delete:
      operationId: deleteBenefitPlan
      tags: [benefits]
      summary: Delete benefit plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Enrollments
  /enrollments:
    get:
      operationId: listEnrollments
      tags: [enrollments]
      summary: List all enrollments
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: employeeId
          in: query
          schema:
            type: integer
        - name: planId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enrollment"
    post:
      operationId: createEnrollment
      tags: [enrollments]
      summary: Create enrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentInput"
      responses:
        "201":
          description: Created enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"

  /enrollments/{id}:
    get:
      operationId: getEnrollment
      tags: [enrollments]
      summary: Get enrollment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
    patch:
      operationId: updateEnrollment
      tags: [enrollments]
      summary: Update enrollment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentUpdate"
      responses:
        "200":
          description: Updated enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"

  /enrollments/{id}/transmit:
    post:
      operationId: transmitEnrollment
      tags: [enrollments]
      summary: Transmit enrollment to carrier via EDI/SFTP/Email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransmitInput"
      responses:
        "200":
          description: Transmission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransmitResult"

  # Carriers
  /carriers:
    get:
      operationId: listCarriers
      tags: [carriers]
      summary: List all carriers
      responses:
        "200":
          description: List of carriers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Carrier"
    post:
      operationId: createCarrier
      tags: [carriers]
      summary: Create a carrier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CarrierInput"
      responses:
        "201":
          description: Created carrier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Carrier"

  /carriers/{id}:
    get:
      operationId: getCarrier
      tags: [carriers]
      summary: Get carrier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Carrier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Carrier"
    patch:
      operationId: updateCarrier
      tags: [carriers]
      summary: Update carrier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CarrierUpdate"
      responses:
        "200":
          description: Updated carrier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Carrier"
    delete:
      operationId: deleteCarrier
      tags: [carriers]
      summary: Delete carrier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /carriers/{id}/test-connection:
    post:
      operationId: testCarrierConnection
      tags: [carriers]
      summary: Test carrier EDI/SFTP connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  # Documents
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: carrierId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create/upload a document record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents/{id}/transmit-email:
    post:
      operationId: transmitDocumentEmail
      tags: [documents]
      summary: Email document to carrier enrollment department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTransmitInput"
      responses:
        "200":
          description: Email transmit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransmitResult"

  # Integrations (Payroll systems)
  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List configured payroll integrations
      responses:
        "200":
          description: List of integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"
    post:
      operationId: createIntegration
      tags: [integrations]
      summary: Configure a payroll integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationInput"
      responses:
        "201":
          description: Created integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /integrations/{id}:
    get:
      operationId: getIntegration
      tags: [integrations]
      summary: Get integration by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
    patch:
      operationId: updateIntegration
      tags: [integrations]
      summary: Update integration settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationUpdate"
      responses:
        "200":
          description: Updated integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
    delete:
      operationId: deleteIntegration
      tags: [integrations]
      summary: Delete integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /integrations/{id}/sync:
    post:
      operationId: syncIntegration
      tags: [integrations]
      summary: Sync employees from payroll integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /employers:
    get:
      operationId: listEmployers
      tags: [employers]
      summary: List all employers
      responses:
        "200":
          description: List of employers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employer"
    post:
      operationId: createEmployer
      tags: [employers]
      summary: Create employer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employer"

  /employers/{id}:
    get:
      operationId: getEmployer
      tags: [employers]
      summary: Get employer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employer"
    patch:
      operationId: updateEmployer
      tags: [employers]
      summary: Update employer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employer"
    delete:
      operationId: deleteEmployer
      tags: [employers]
      summary: Delete employer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /employers/{id}/upload-census:
    post:
      operationId: uploadEmployerCensus
      tags: [employers]
      summary: Upload employee census CSV for employer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsvImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all admin users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Dependents
  /employees/{employeeId}/dependents:
    get:
      operationId: listDependents
      tags: [dependents]
      summary: List dependents for an employee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of dependents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dependent"
    post:
      operationId: createDependent
      tags: [dependents]
      summary: Add dependent
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DependentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dependent"

  /dependents/{id}:
    patch:
      operationId: updateDependent
      tags: [dependents]
      summary: Update dependent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DependentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dependent"
    delete:
      operationId: deleteDependent
      tags: [dependents]
      summary: Remove dependent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dependents/aging-out:
    get:
      operationId: listAgingOutDependents
      tags: [dependents]
      summary: List dependents turning 26 within 60 days
      responses:
        "200":
          description: Dependents about to age out
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgingOutDependent"

  # Enrollment Periods
  /enrollment-periods:
    get:
      operationId: listEnrollmentPeriods
      tags: [enrollment-periods]
      summary: List enrollment periods
      responses:
        "200":
          description: List of enrollment periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnrollmentPeriod"
    post:
      operationId: createEnrollmentPeriod
      tags: [enrollment-periods]
      summary: Create enrollment period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentPeriodInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentPeriod"

  /enrollment-periods/{id}:
    patch:
      operationId: updateEnrollmentPeriod
      tags: [enrollment-periods]
      summary: Update enrollment period
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentPeriodUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentPeriod"
    delete:
      operationId: deleteEnrollmentPeriod
      tags: [enrollment-periods]
      summary: Delete enrollment period
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /enrollment-periods/active:
    get:
      operationId: getActiveEnrollmentPeriod
      tags: [enrollment-periods]
      summary: Get currently active enrollment period
      responses:
        "200":
          description: Active period or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentPeriodStatus"

  /enrollment-periods/{id}/send-notices:
    post:
      operationId: sendEnrollmentNotices
      tags: [enrollment-periods]
      summary: Send enrollment notices to all active employees
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNoticesInput"
      responses:
        "200":
          description: Notices sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendNoticesResult"

  # Enrollment Changes (approval workflow)
  /enrollment-changes:
    get:
      operationId: listEnrollmentChanges
      tags: [enrollment-changes]
      summary: List pending enrollment change requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of change requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnrollmentChange"

  /enrollment-changes/{id}/approve:
    post:
      operationId: approveEnrollmentChange
      tags: [enrollment-changes]
      summary: Approve an enrollment change
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeDecisionInput"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentChange"

  /enrollment-changes/{id}/deny:
    post:
      operationId: denyEnrollmentChange
      tags: [enrollment-changes]
      summary: Deny an enrollment change
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeDecisionInput"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentChange"

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResult"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      tags: [notifications]
      summary: Get count of unread notifications
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  # Chatbot
  /chatbot/message:
    post:
      operationId: sendChatbotMessage
      tags: [chatbot]
      summary: Send a message to the benefits chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatbotMessageInput"
      responses:
        "200":
          description: Chatbot response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatbotResponse"

  /chatbot/topics:
    get:
      operationId: getChatbotTopics
      tags: [chatbot]
      summary: Get list of chatbot topics
      responses:
        "200":
          description: Topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatbotTopic"


